back:                  이전
permalink:             Permalink
permalink_icon:        content-hash
templates:             Templates (for web app)
present:               present
toc:                   목차
note:                  노트
description:           설명
search:                검색
search_placeholder:    검색할 단어를 입력해주세요...

loading:               로딩중...
