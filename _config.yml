# Site settings
title:          작은 공간
description:    "아티렌의 블로그이에요!"
url:            https://github.com/artiren012/artiren012.github.io

# Author
author:
  name:         Artiren
  email:        
  url:          https:/artiren.me

# Build settings
markdown:       kramdown

# Assets
sass:
  sass_dir:     _sass
  style:        compressed

# Gems
plugins:
  - jekyll-feed
  - jekyll-paginate
  - jekyll-seo-tag
  # - jemoji #Uncomment this to allow emoji in your post

# Permalinks
permalink:      /:year-:month-:day/:title
paginate:       5

# Related posts settings
related_posts_section:
  max_count:        5
  min_common_tags:  2

# Links to social media
social:
  email: 
  github: https://github.com/artiren012
  twitter: https://twitter.com/artiren012
  linkedin: 
